<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass Slide Selector</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&display=swap');

    /* Theme Tokens required for the Neumorphic Liquid Glass Effect */
    body {
      background: #E8E8E9;
      /* Light mode canvas */
      font-family: "DM Sans", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;

      /* Liquid Glass Variables */
      --c-glass: #bbbbbc;
      --c-light: #ffffff;
      --c-dark: #000000;
      --c-content: #222244;
      --c-action: #0052f5;
      --glass-reflex-dark: 1;
      --glass-reflex-light: 1;
      --saturation: 150%;
    }

    /* Core Container Layout */
    .switcher {
      position: relative;
      width: auto;
      max-width: 450px;
      min-width: 320px;
      height: 64px;
      padding: 6px 8px;
      margin: 0 auto;
      border: none;
      border-radius: 99em;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      box-sizing: border-box;

      /* Glassmorphism settings matching the original setup */
      background-color: color-mix(in srgb, var(--c-glass) 12%, transparent);
      backdrop-filter: blur(8px) url(#switcher) saturate(var(--saturation));
      -webkit-backdrop-filter: blur(8px) saturate(var(--saturation));
      box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 10%), transparent),
        inset 1.8px 3px 0px -2px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 90%), transparent),
        inset -2px -2px 0px -2px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 80%), transparent),
        inset -3px -8px 1px -6px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 60%), transparent),
        inset -0.3px -1px 4px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 12%), transparent),
        inset -1.5px 2.5px 0px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent),
        inset 0px 3px 4px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent),
        inset 2px -6.5px 1px -4px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent),
        0px 1px 5px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent),
        0px 6px 16px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 8%), transparent);
    }

    .switcher__legend {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      border: 0;
      padding: 0;
      white-space: nowrap;
      clip-path: inset(100%);
      clip: rect(0 0 0 0);
      overflow: hidden;
    }

    .switcher__input {
      clip: rect(0 0 0 0);
      clip-path: inset(100%);
      height: 1px;
      width: 1px;
      overflow: hidden;
      position: absolute;
      white-space: nowrap;
    }

    /* Option Items structure */
    .switcher__option {
      --c: var(--c-content);
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      padding: 0;
      border-radius: 99em;
      transition: all 160ms;
      cursor: pointer;
    }

    .switcher__option:hover {
      --c: var(--c-action);
    }

    .switcher__option:has(input:checked) {
      cursor: default;
    }

    /* Text Styling */
    .switcher__text {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--c);
      white-space: nowrap;
      user-select: none;
      transition: color 250ms ease, scale 200ms cubic-bezier(0.5, 0, 0, 1);
    }

    .switcher__option:hover .switcher__text {
      scale: 1.05;
    }

    .switcher__filter {
      position: absolute;
      width: 0;
      height: 0;
      z-index: -1;
    }

    /* Moving Slider Glass Bubble Component */
    .switcher::after {
      content: '';
      position: absolute;
      width: calc(33.333% - 6px);
      height: calc(100% - 12px);
      top: 6px;
      left: 6px;
      border-radius: 99em;
      z-index: -1;

      /* Glass backing colors matching your original framework layout */
      background-color: color-mix(in srgb, var(--c-glass) 36%, transparent);
      box-shadow:
        inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 10%), transparent),
        inset 2px 1px 0px -1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 90%), transparent),
        inset -1.5px -1px 0px -1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 80%), transparent),
        inset -2px -6px 1px -5px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 60%), transparent),
        inset -1px 2px 3px -1px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 20%), transparent),
        inset 0px -4px 1px -2px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 10%), transparent),
        0px 3px 6px 0px color-mix(in srgb, var(--c-dark) calc(var(--glass-reflex-dark) * 8%), transparent);
    }

    /* Proportional Multi-Option Slider Transforms */
    .switcher:has(input[c-option="1"]:checked)::after {
      translate: 0 0;
      transition: translate 400ms cubic-bezier(1, 0.0, 0.4, 1);
    }

    .switcher:has(input[c-option="2"]:checked)::after {
      translate: calc(100% + 4px) 0;
      transition: translate 400ms cubic-bezier(1, 0.0, 0.4, 1);
    }

    .switcher:has(input[c-option="3"]:checked)::after {
      translate: calc(200% + 8px) 0;
      transition: translate 400ms cubic-bezier(1, 0.0, 0.4, 1);
    }
  </style>
</head>

<body>

  <fieldset class="switcher">
    <legend class="switcher__legend">Choose trip type</legend>

    <label class="switcher__option">
      <input class="switcher__input" type="radio" name="trip-type" value="oneway" c-option="1" checked />
      <span class="switcher__text">ONE WAY</span>
    </label>

    <label class="switcher__option">
      <input class="switcher__input" type="radio" name="trip-type" value="round" c-option="2" />
      <span class="switcher__text">ROUND</span>
    </label>

    <label class="switcher__option">
      <input class="switcher__input" type="radio" name="trip-type" value="airport" c-option="3" />
      <span class="switcher__text">AIRPORT</span>
    </label>
